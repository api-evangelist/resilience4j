aid: resilience4j
name: Resilience4j
description: >-
  Resilience4j is a lightweight fault tolerance library designed for Java 8 and
  functional programming, providing higher-order functions to enhance functional
  interfaces with Circuit Breaker, Rate Limiter, Retry, Bulkhead, and TimeLimiter
  patterns. Designed as a replacement for Netflix Hystrix.
